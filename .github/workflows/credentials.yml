name: Test Credentials
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test Gemini API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing GEMINI_API_KEY..."
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY is not set"
            exit 1
          fi
          echo "SUCCESS: Gemini key is set"
      
      - name: Test YouTube Credentials
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "Testing YOUTUBE_CREDENTIALS..."
          python3 scripts/test_youtube.py
      
      - name: Success
        run: echo "All credentials are valid!"
