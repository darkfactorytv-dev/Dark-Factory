name: ✅ Testar Secrets
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar Secrets
        env:
          GEMINI: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "GEMINI_API_KEY: ${#GEMINI} chars"
          echo "YOUTUBE_CREDENTIALS: ${#YOUTUBE} chars"
          
          if [ ${#GEMINI} -gt 10 ]; then
            echo "✅ GEMINI: OK"
          else
            echo "❌ GEMINI: PROVAVELMENTE VAZIO"
          fi
          
          if [ ${#YOUTUBE} -gt 50 ]; then
            echo "✅ YOUTUBE: OK (tamanho bom)"
            # Teste simples de JSON
            echo "$YOUTUBE" | python3 -c "import json, sys; json.loads(sys.stdin.read()); print('✅ JSON válido')"
          else
            echo "❌ YOUTUBE: MUITO PEQUENO (esperado > 50 chars)"
          fi
