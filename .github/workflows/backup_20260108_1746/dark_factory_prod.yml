name: 🏭 Dark Factory (com Variables)
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # A cada 6 horas

jobs:
  produce:
    runs-on: ubuntu-latest
    env:
      # Tenta usar Secrets primeiro, depois Variables como fallback
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || vars.GEMINI_API_KEY }}
      YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS || vars.YOUTUBE_CREDENTIALS }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Verificar credenciais
        run: |
          echo "🔍 Verificando configuração..."
          echo ""
          
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERRO: GEMINI_API_KEY não configurado"
            echo ""
            echo "📋 CONFIGURE UMA DESTAS OPÇÕES:"
            echo "1. Secrets: Settings > Secrets > Actions > GEMINI_API_KEY"
            echo "2. Variables: Settings > Variables > Actions > GEMINI_API_KEY"
            exit 1
          else
            echo "✅ GEMINI_API_KEY: OK (${#GEMINI_API_KEY} chars)"
          fi
          
          if [ -z "$YOUTUBE_CREDENTIALS" ]; then
            echo "❌ ERRO: YOUTUBE_CREDENTIALS não configurado"
            exit 1
          else
            echo "✅ YOUTUBE_CREDENTIALS: OK (${#YOUTUBE_CREDENTIALS} chars)"
            
            # Testar JSON
            echo "$YOUTUBE_CREDENTIALS" > test.json
            if python3 -c "import json; json.load(open('test.json'))"; then
              echo "✅ JSON: VÁLIDO"
            else
              echo "❌ JSON: INVÁLIDO"
              exit 1
            fi
          fi
      
      - name: Instalar dependências
        run: pip install -r requirements.txt
      
      - name: Gerar conteúdo (simulado)
        run: |
          echo "🎬 Gerando conteúdo com Gemini..."
          echo "Esta é uma simulação. No real, usaria content_generator.py"
          echo "Conteúdo gerado: $(date)" > content.txt
      
      - name: Upload (simulado)
        run: |
          echo "📤 Upload para YouTube (simulado)..."
          echo "Vídeo seria publicado agora"
      
      - name: Sucesso
        run: echo "✅ Dark Factory executado com sucesso!"
