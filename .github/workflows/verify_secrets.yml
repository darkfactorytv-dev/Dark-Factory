name: 🔍 Verificar Secrets
on: [workflow_dispatch]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Testar Secrets
        env:
          GEMINI: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "=== VERIFICAÇÃO DE SECRETS ==="
          echo ""
          
          # Gemini
          if [ -z "$GEMINI" ]; then
            echo "GEMINI_API_KEY: ❌ VAZIO"
          else
            echo "GEMINI_API_KEY: ✅ PRESENTE"
            echo "  Tamanho: ${#GEMINI} chars"
            echo "  Primeiros 5: ${GEMINI:0:5}..."
          fi
          
          echo ""
          
          # YouTube
          if [ -z "$YOUTUBE" ]; then
            echo "YOUTUBE_CREDENTIALS: ❌ VAZIO"
          else
            echo "YOUTUBE_CREDENTIALS: ✅ PRESENTE"
            echo "  Tamanho: ${#YOUTUBE} chars"
            
            # Teste básico de JSON
            echo "$YOUTUBE" > test.json
            if python3 -c "import json; json.load(open('test.json'))"; then
              echo "  JSON: ✅ VÁLIDO"
            else
              echo "  JSON: ❌ INVÁLIDO"
            fi
          fi
