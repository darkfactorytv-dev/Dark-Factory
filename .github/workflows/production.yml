name: Dark Factory Production

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  produce:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Test Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "=== TESTANDO SECRETS ==="
          
          # Test Gemini
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERRO: GEMINI_API_KEY nao configurado"
            exit 1
          fi
          echo "OK: Gemini key presente"
          
          # Test YouTube
          if [ -z "$YOUTUBE_CREDENTIALS" ]; then
            echo "ERRO: YOUTUBE_CREDENTIALS nao configurado"
            exit 1
          fi
          
          echo "$YOUTUBE_CREDENTIALS" > test.json
          if python3 -c "import json; json.load(open('test.json'))"; then
            echo "OK: YouTube JSON valido"
          else
            echo "ERRO: YouTube JSON invalido"
            exit 1
          fi
          
          echo "TODOS OS SECRETS VALIDOS!"
      
      - name: Run System Check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== SYSTEM CHECK ==="
          python3 -c "
import os, sys
print(f'Python: {sys.version}')
key = os.getenv(\"GEMINI_API_KEY\")
print(f'Gemini: {\"OK\" if key else \"FALTA\"}')
print('System check completo')
          "
      
      - name: Success
        run: echo "? WORKFLOW EXECUTADO COM SUCESSO!"
