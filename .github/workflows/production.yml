name: 🏭 Dark Factory Production

on:
  workflow_dispatch:    # Permite execução manual
  schedule:
    - cron: "0 */6 * * *"  # A cada 6 horas
  push:
    branches: [ main ]

jobs:
  produce-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install google-generativeai google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

      - name: 🔐 Validate Credentials
        id: validate-creds
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "🔍 Validando credenciais..."
          
          # Test Gemini API Key
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ ERRO: GEMINI_API_KEY não configurado"
            echo "Vá em Settings > Secrets > Actions e adicione o secret"
            exit 1
          fi
          echo "✅ Gemini API Key: OK (${#GEMINI_API_KEY} chars)"
          
          # Test YouTube Credentials
          if [ -z "$YOUTUBE_CREDENTIALS" ]; then
            echo "❌ ERRO: YOUTUBE_CREDENTIALS não configurado"
            exit 1
          fi
          
          echo "$YOUTUBE_CREDENTIALS" > /tmp/youtube_creds.json
          if python3 -c "import json; json.load(open('/tmp/youtube_creds.json'))"; then
            echo "✅ YouTube Credentials: JSON válido"
          else
            echo "❌ ERRO: YouTube Credentials JSON inválido"
            exit 1
          fi

      - name: 🧪 Run System Check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "🧪 Executando verificação do sistema..."
          if [ -f src/system_check.py ]; then
            python src/system_check.py
          else
            echo "⚠️  system_check.py não encontrado, criando teste básico..."
            python3 -c "
import os, json, sys
print('=== DARK FACTORY SYSTEM CHECK ===')
print(f'Python: {sys.version}')
print(f'Gemini Key: {'✅ Presente' if os.getenv(\"GEMINI_API_KEY\") else '❌ Ausente'}')
print(f'YouTube Creds: {'✅ Presente' if os.getenv(\"YOUTUBE_CREDENTIALS\") else '❌ Ausente'}')
print('✅ Sistema verificado')
            "
          fi

      - name: 🎬 Generate Content
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🎬 Gerando conteúdo..."
          if [ -f src/content_generator.py ]; then
            python src/content_generator.py
          else
            echo "⚠️  content_generator.py não encontrado"
            echo "Criando conteúdo de teste..."
            echo '{"title": "Test Content", "script": "This is test content"}' > content.json
          fi
          echo "content_file=content.json" >> $GITHUB_OUTPUT

      - name: 📤 Prepare Upload
        if: steps.generate.outputs.content_file
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "📤 Preparando upload para YouTube..."
          if [ -f src/youtube_uploader.py ]; then
            echo "Executando youtube_uploader.py..."
            python src/youtube_uploader.py
          else
            echo "⚠️  youtube_uploader.py não encontrado"
            echo "Simulando upload..."
            echo "📹 Vídeo processado"
            echo "🎞️  Thumbnail gerada"
            echo "📊 Metadata pronta"
          fi

      - name: 📊 Generate Report
        if: always()
        run: |
          echo "📊 RELATÓRIO DE EXECUÇÃO"
          echo "========================"
          echo "Data: $(date)"
          echo "Workflow: ${{ github.workflow }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "📁 Artefatos gerados:"
          ls -la *.json *.log 2>/dev/null || echo "Nenhum arquivo encontrado"
          echo ""
          echo "✅ Workflow concluído em: $(date)"

      - name: 💾 Save Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: |
            *.json
            *.log
            simulation.log
          retention-days: 7

      - name: 🎉 Success Notification
        if: success()
        run: echo "🚀 Dark Factory produziu conteúdo com sucesso!"
