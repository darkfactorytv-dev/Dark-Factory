name: Dark Factory Production
on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install google-genai google-api-python-client
          
      - name: Run Dark Factory
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "Starting Dark Factory..."
          python src/content_generator.py
          python src/youtube_uploader.py
          
      - name: Complete
        run: echo "Dark Factory completed"
