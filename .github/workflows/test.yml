name: Test Secrets
on: [workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing GEMINI_API_KEY..."
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "ERROR: GEMINI_API_KEY is missing"
            exit 1
          fi
          echo "SUCCESS: Key exists"
      
      - name: Test YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "Testing YOUTUBE_CREDENTIALS..."
          if [ -z "$YOUTUBE_CREDENTIALS" ]; then
            echo "ERROR: YOUTUBE_CREDENTIALS is missing"
            exit 1
          fi
          
          echo "$YOUTUBE_CREDENTIALS" > creds.json
          python3 test_json.py
      
      - name: Success
        run: echo "ALL TESTS PASSED"
