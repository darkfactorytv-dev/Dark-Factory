name: DARK FACTORY
on: [workflow_dispatch, push]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - run: echo "?? DARK FACTORY STARTING..."
      
      - uses: actions/checkout@v4
      
      - name: Show Files
        run: |
          echo "?? Project Structure:"
          find . -name "*.py" -type f | head -20
          echo ""
          echo "?? Python Info:"
          python --version
      
      - name: Test Dark Factory
        run: |
          echo "?? Testing Dark Factory..."
          if [ -f "src/darker_factory.py" ]; then
            python src/darker_factory.py
          else
            echo "? darker_factory.py not found"
          fi
      
      - name: Generate Content
        run: |
          echo "?? Generating content..."
          if [ -f "src/simple_generator.py" ]; then
            python src/simple_generator.py
          else
            echo "Test content $(date)" > test.txt
          fi
      
      - run: echo "? DARK FACTORY COMPLETE"
