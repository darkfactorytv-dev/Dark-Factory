name: 🏭 Dark Factory PRODUCTION
on:
  schedule:
    - cron: "0 */6 * * *"  # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - test

jobs:
  dark-factory-pipeline:
    name: 🏭 Dark Factory Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies installed"
      
      - name: 🔍 System Verification
        id: verify
        run: |
          echo "🔍 Verifying Dark Factory system..."
          OUTPUT=$(python src/darker_factory.py 2>&1)
          echo "$OUTPUT"
          
          if echo "$OUTPUT" | grep -q "SISTEMA 100% PRONTO"; then
            echo "✅ System verified"
            echo "status=verified" >> $GITHUB_OUTPUT
          else
            echo "⚠️ System issues detected"
            echo "status=issues" >> $GITHUB_OUTPUT
          fi
      
      - name: 🎬 Content Generation
        if: steps.verify.outputs.status == 'verified'
        id: generate
        run: |
          echo "🎬 Generating YouTube content..."
          
          # Try Gemini first, fallback to simple
          if python src/content_generator.py; then
            echo "method=gemini" >> $GITHUB_OUTPUT
            echo "✅ Gemini generation successful"
          else
            echo "🔄 Falling back to simple generator..."
            python src/simple_generator.py
            echo "method=simple" >> $GITHUB_OUTPUT
            echo "✅ Simple generation successful"
          fi
          
          # Show generated content
          if [ -f "latest_content.txt" ]; then
            echo "📄 Generated content preview:"
            head -5 latest_content.txt
          fi
      
      - name: 📊 Production Report
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "🏭 DARK FACTORY - PRODUCTION REPORT"
          echo "========================================"
          echo "Run: ${{ github.run_number }}"
          echo "ID: ${{ github.run_id }}"
          echo "Date: $(date)"
          echo "Trigger: ${{ github.event_name }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "📈 Metrics:"
          echo "  System: ${{ steps.verify.outputs.status }}"
          echo "  Generation: ${{ steps.generate.outputs.method || 'none' }}"
          echo ""
          echo "📁 Generated files:"
          find . -maxdepth 1 -name "*.txt" -o -name "*.json" | while read f; do
            size=$(wc -c < "$f" 2>/dev/null || echo "0")
            echo "  - $(basename "$f") ($size bytes)"
          done
          echo ""
          echo "⏱️ Completed: $(date)"
          echo "========================================"
      
      - name: 💾 Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dark-factory-${{ github.run_number }}
          path: |
            *.txt
            *.json
            latest_content.txt
          retention-days: 30
      
      - name: 🎉 Success Notification
        if: success()
        run: |
          echo "========================================"
          echo "🚀 DARK FACTORY v1.0 - PRODUCTION SUCCESS"
          echo "========================================"
          echo ""
          echo "✅ System: Operational"
          echo "✅ Schedule: Active (every 6 hours)"
          echo "✅ Next run: In 6 hours"
          echo ""
          echo "📈 GitHub Actions Dashboard:"
          echo "https://github.com/${{ github.repository }}/actions"
          echo ""
          echo "🏭 Project fully automated!"
          echo "========================================"
