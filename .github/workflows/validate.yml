name: Validate Secrets
on: [workflow_dispatch]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Test Gemini Secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Testing GEMINI_API_KEY..."
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "? ERROR: GEMINI_API_KEY is empty"
            echo "Configure it in: Settings > Secrets > Actions"
            exit 1
          else
            echo "? SUCCESS: Gemini key exists (${#GEMINI_API_KEY} chars)"
          fi
      
      - name: Test YouTube Secret
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "Testing YOUTUBE_CREDENTIALS..."
          
          # Check if secret exists
          if [ -z "$YOUTUBE_CREDENTIALS" ]; then
            echo "? ERROR: YOUTUBE_CREDENTIALS is empty"
            exit 1
          fi
          
          echo "? Secret exists (${#YOUTUBE_CREDENTIALS} chars)"
          
          # Save to file
          echo "$YOUTUBE_CREDENTIALS" > youtube_creds.json
          echo "?? File saved: youtube_creds.json"
          
          # Simple inline Python test (no heredoc)
          python3 -c "
import json, sys
try:
    with open('youtube_creds.json', 'r') as f:
        data = json.load(f)
    print('? JSON is valid')
    
    # Check structure
    if 'installed' in data:
        print('? Has \"installed\" key')
        client_id = data['installed'].get('client_id', '')
        if client_id:
            print(f'   Client ID: {client_id[:30]}...')
        else:
            print('   ??  client_id not found')
    else:
        print('? Missing \"installed\" key')
        
except json.JSONDecodeError as e:
    print(f'? JSON error: {e}')
    sys.exit(1)
except Exception as e:
    print(f'? Error: {e}')
    sys.exit(1)
          "
      
      - name: Final Check
        run: |
          echo "========================================"
          echo "? SECRETS VALIDATION COMPLETE"
          echo "========================================"
          echo "Both secrets are valid and ready to use!"
          echo ""
          echo "Next steps:"
          echo "1. Add your Python scripts to src/"
          echo "2. Update the workflow to call them"
          echo "3. Schedule automatic execution"
